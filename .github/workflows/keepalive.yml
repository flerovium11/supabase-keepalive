name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 8 */3 * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping active projects for all accounts
        env:
          SUPABASE_TOKENS: ${{ secrets.SUPABASE_TOKENS }}
        run: |
          FAILED=0

          echo "# Keep-Alive Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Project | Ref | HTTP |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|---------|-----|------|" >> $GITHUB_STEP_SUMMARY

          echo "$SUPABASE_TOKENS" | jq -r '.[]' | while read -r TOKEN; do
            PROJECTS=$(curl -sf \
              -H "Authorization: Bearer $TOKEN" \
              https://api.supabase.com/v1/projects)

            if [ -z "$PROJECTS" ] || [ "$PROJECTS" = "null" ]; then
              echo "::error::Could not fetch projects (bad token or API error)"
              FAILED=1
              continue
            fi

            echo "$PROJECTS" | jq -c '.[]' | while read -r project; do
              REF=$(echo "$project" | jq -r '.id')
              NAME=$(echo "$project" | jq -r '.name')
              STATUS=$(echo "$project" | jq -r '.status')

              if [ "$STATUS" != "ACTIVE_HEALTHY" ]; then
                echo "SKIP: $NAME is $STATUS — not pinging"
                continue
              fi

              KEYS=$(curl -sf \
                -H "Authorization: Bearer $TOKEN" \
                "https://api.supabase.com/v1/projects/${REF}/api-keys")

              ANON_KEY=$(echo "$KEYS" | jq -r '.[] | select(.name == "anon") | .api_key')

              if [ -z "$ANON_KEY" ] || [ "$ANON_KEY" = "null" ]; then
                echo "::warning::Could not fetch anon key for $NAME ($REF) — skipping"
                echo "| ⚠️ | $NAME | \`$REF\` | no key |" >> $GITHUB_STEP_SUMMARY
                continue
              fi

              HTTP=$(curl -o /dev/null -sw "%{http_code}" \
                -X GET \
                -H "apikey: $ANON_KEY" \
                -H "Authorization: Bearer $ANON_KEY" \
                -H "Accept: application/json" \
                "https://${REF}.supabase.co/rest/v1/information_schema.tables?limit=1")

              if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 400 ]; then
                echo "OK: $NAME → HTTP $HTTP"
                echo "| ✅ | $NAME | \`$REF\` | $HTTP |" >> $GITHUB_STEP_SUMMARY
              else
                echo "::error::FAIL: $NAME ($REF) → HTTP $HTTP"
                echo "| ❌ | $NAME | \`$REF\` | $HTTP |" >> $GITHUB_STEP_SUMMARY
                FAILED=1
              fi
            done
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Paused projects skipped. Ran at $(date -u '+%Y-%m-%d %H:%M UTC')._" >> $GITHUB_STEP_SUMMARY

          exit $FAILED
