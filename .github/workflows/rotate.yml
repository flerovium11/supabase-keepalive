name: Supabase Rotate Projects

on:
  workflow_dispatch:
    inputs:
      important_projects:
        description: >
          Comma-separated names of projects to keep running after rotation
          (e.g. "Libriq, Ontra"). Leave empty to keep currently-active projects.
        required: false
        default: ""

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Rotate all accounts
        env:
          SUPABASE_TOKENS: ${{ secrets.SUPABASE_TOKENS }}
          IMPORTANT_INPUT: ${{ github.event.inputs.important_projects }}
        run: |
          # ─── Helpers ────────────────────────────────────────────────────────

          wait_for_status() {
            local TOKEN=$1 REF=$2 NAME=$3 TARGET=$4
            local MAX_WAIT=300 ELAPSED=0
            echo "  ⏳ Waiting for $NAME to reach $TARGET..."
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              CURRENT=$(curl -sf \
                -H "Authorization: Bearer $TOKEN" \
                "https://api.supabase.com/v1/projects/$REF" \
                | jq -r '.status // "UNKNOWN"')
              [ "$CURRENT" = "$TARGET" ] && echo "  ✅ $NAME is $TARGET" && return 0
              sleep 10
              ELAPSED=$((ELAPSED + 10))
              echo "  ... $NAME is $CURRENT (${ELAPSED}s elapsed)"
            done
            echo "  ::warning::$NAME did not reach $TARGET after ${MAX_WAIT}s"
            return 1
          }

          pause_project() {
            local TOKEN=$1 REF=$2 NAME=$3
            echo "  ⏸️  Pausing $NAME..."
            curl -sf -X POST \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.supabase.com/v1/projects/$REF/pause" > /dev/null
            wait_for_status "$TOKEN" "$REF" "$NAME" "INACTIVE"
          }

          # Returns 0 = success, 1 = quota limit hit, 2 = unrecoverable (90+ days)
          restore_project() {
            local TOKEN=$1 REF=$2 NAME=$3
            echo "  🔄 Restoring $NAME..."
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              "https://api.supabase.com/v1/projects/$REF/restore")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              wait_for_status "$TOKEN" "$REF" "$NAME" "ACTIVE_HEALTHY"
              return 0
            elif [ "$HTTP_CODE" = "400" ]; then
              echo "  ⚠️  $NAME cannot be restored (HTTP 400 — likely 90+ days paused): $BODY"
              return 2
            else
              echo "  ⚠️  Could not restore $NAME (HTTP $HTTP_CODE): $BODY"
              echo "  → Assuming quota limit reached"
              return 1
            fi
          }

          normalize() { echo "$1" | tr '[:upper:]' '[:lower:]' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }

          # ─── Main loop ──────────────────────────────────────────────────────

          ACCOUNT_NUM=0

          echo "$SUPABASE_TOKENS" | jq -r '.[]' | while read -r TOKEN; do
            ACCOUNT_NUM=$((ACCOUNT_NUM + 1))
            echo ""
            echo "════════════════════════════════════════"
            echo "Account $ACCOUNT_NUM"
            echo "════════════════════════════════════════"

            PROJECTS=$(curl -sf \
              -H "Authorization: Bearer $TOKEN" \
              https://api.supabase.com/v1/projects)

            if [ -z "$PROJECTS" ] || [ "$PROJECTS" = "null" ]; then
              echo "::error::Could not fetch projects for account $ACCOUNT_NUM"
              continue
            fi

            ALL_REFS=()
            ALL_NAMES=()
            ALL_STATUSES=()
            while IFS= read -r line; do
              ALL_REFS+=("$(echo "$line" | jq -r '.id')")
              ALL_NAMES+=("$(echo "$line" | jq -r '.name')")
              ALL_STATUSES+=("$(echo "$line" | jq -r '.status')")
            done < <(echo "$PROJECTS" | jq -c '.[]')

            # ── Determine important refs ────────────────────────────────────
            IMPORTANT_REFS=()
            if [ -n "$IMPORTANT_INPUT" ]; then
              IFS=',' read -ra INPUT_NAMES <<< "$IMPORTANT_INPUT"
              for INPUT_NAME in "${INPUT_NAMES[@]}"; do
                NORM_INPUT=$(normalize "$INPUT_NAME")
                for i in "${!ALL_NAMES[@]}"; do
                  if [ "$(normalize "${ALL_NAMES[$i]}")" = "$NORM_INPUT" ]; then
                    IMPORTANT_REFS+=("${ALL_REFS[$i]}")
                    echo "📌 Important (matched): ${ALL_NAMES[$i]} (${ALL_REFS[$i]})"
                  fi
                done
              done
            else
              for i in "${!ALL_REFS[@]}"; do
                if [ "${ALL_STATUSES[$i]}" = "ACTIVE_HEALTHY" ]; then
                  IMPORTANT_REFS+=("${ALL_REFS[$i]}")
                  echo "📌 Important (currently active): ${ALL_NAMES[$i]} (${ALL_REFS[$i]})"
                fi
              done
            fi

            is_important() {
              for r in "${IMPORTANT_REFS[@]}"; do [ "$r" = "$1" ] && return 0; done
              return 1
            }

            UNIMPORTANT_REFS=()
            UNIMPORTANT_NAMES=()
            for i in "${!ALL_REFS[@]}"; do
              if ! is_important "${ALL_REFS[$i]}"; then
                UNIMPORTANT_REFS+=("${ALL_REFS[$i]}")
                UNIMPORTANT_NAMES+=("${ALL_NAMES[$i]}")
              fi
            done

            TOTAL=${#ALL_REFS[@]}
            echo "📊 Total: $TOTAL | Important: ${#IMPORTANT_REFS[@]} | Unimportant: ${#UNIMPORTANT_REFS[@]}"

            # ── Step 1: Pause everything currently active ───────────────────
            echo ""
            echo "── Step 1: Pause all active projects ──"
            for i in "${!ALL_REFS[@]}"; do
              if [ "${ALL_STATUSES[$i]}" = "ACTIVE_HEALTHY" ]; then
                pause_project "$TOKEN" "${ALL_REFS[$i]}" "${ALL_NAMES[$i]}"
              else
                echo "  SKIP (already ${ALL_STATUSES[$i]}): ${ALL_NAMES[$i]}"
              fi
            done

            # ── Step 2: Reset timers for ALL unimportant projects ───────────
            #
            # Key insight: restore one → pause it → restore next.
            # Only ever 1 project active at a time here, so quota is never touched.
            #
            echo ""
            echo "── Step 2: Reset inactivity timers (one at a time) ──"
            RESET_COUNT=0
            DEAD_UNIMPORTANT=()
            DEAD_UNIMPORTANT_REFS=()
            for i in "${!UNIMPORTANT_REFS[@]}"; do
              REF="${UNIMPORTANT_REFS[$i]}"
              NAME="${UNIMPORTANT_NAMES[$i]}"
              RESULT=0
              restore_project "$TOKEN" "$REF" "$NAME" || RESULT=$?
              if [ "$RESULT" = "0" ]; then
                pause_project "$TOKEN" "$REF" "$NAME"
                RESET_COUNT=$((RESET_COUNT + 1))
              elif [ "$RESULT" = "2" ]; then
                DEAD_UNIMPORTANT+=("$NAME")
                DEAD_UNIMPORTANT_REFS+=("$REF")
                echo "  → Unrecoverable, skipping"
              else
                # Quota hit mid-reset. This shouldn't happen (we pause before
                # each next restore), but handle it defensively.
                echo "  ::warning::Unexpected quota error resetting $NAME — stopping timer resets"
                break
              fi
            done

            # ── Step 3: Restore important projects ─────────────────────────
            echo ""
            echo "── Step 3: Restore important projects ──"
            FAILED_IMPORTANT=()
            DEAD_IMPORTANT=()
            for i in "${!IMPORTANT_REFS[@]}"; do
              REF="${IMPORTANT_REFS[$i]}"
              NAME=""
              for j in "${!ALL_REFS[@]}"; do
                [ "${ALL_REFS[$j]}" = "$REF" ] && NAME="${ALL_NAMES[$j]}" && break
              done
              RESULT=0
              restore_project "$TOKEN" "$REF" "$NAME" || RESULT=$?
              if [ "$RESULT" = "1" ]; then
                FAILED_IMPORTANT+=("$NAME")
                echo "  ::warning::Quota full — could not restore important project: $NAME"
              elif [ "$RESULT" = "2" ]; then
                DEAD_IMPORTANT+=("$NAME")
                echo "  ::error::$NAME has been paused 90+ days and cannot be restored"
              fi
            done

            # ── Step 4: Fill remaining quota with unimportant projects ──────
            echo ""
            echo "── Step 4: Fill remaining quota with unimportant projects ──"
            is_dead_unimportant() {
              for r in "${DEAD_UNIMPORTANT_REFS[@]}"; do [ "$r" = "$1" ] && return 0; done
              return 1
            }

            BONUS_RESTORED=()
            for i in "${!UNIMPORTANT_REFS[@]}"; do
              REF="${UNIMPORTANT_REFS[$i]}"
              NAME="${UNIMPORTANT_NAMES[$i]}"
              if is_dead_unimportant "$REF"; then
                echo "  SKIP (known unrestorable): $NAME"
                continue
              fi
              RESULT=0
              restore_project "$TOKEN" "$REF" "$NAME" || RESULT=$?
              if [ "$RESULT" = "0" ]; then
                BONUS_RESTORED+=("$NAME")
              elif [ "$RESULT" = "2" ]; then
                echo "  → Unrecoverable, skipping"
              else
                echo "  → Quota full"
                break
              fi
            done

            # ── Summary ─────────────────────────────────────────────────────
            echo ""
            echo "── Account $ACCOUNT_NUM summary ──"
            echo "  ✅ Timers reset: $RESET_COUNT/${#UNIMPORTANT_REFS[@]} unimportant projects"
            echo "  ✅ Important restored: $((${#IMPORTANT_REFS[@]} - ${#FAILED_IMPORTANT[@]} - ${#DEAD_IMPORTANT[@]}))/${#IMPORTANT_REFS[@]}"
            echo "  ✅ Bonus active (unimportant, fills quota): ${#BONUS_RESTORED[@]}"
            [ ${#BONUS_RESTORED[@]}    -gt 0 ] && echo "     (${BONUS_RESTORED[*]})"
            [ ${#FAILED_IMPORTANT[@]}  -gt 0 ] && echo "  ⚠️  Quota full for: ${FAILED_IMPORTANT[*]}"
            [ ${#DEAD_IMPORTANT[@]}    -gt 0 ] && echo "  💀 90+ days paused (unrestorable): ${DEAD_IMPORTANT[*]}"
            [ ${#DEAD_UNIMPORTANT[@]}  -gt 0 ] && echo "  💀 90+ days paused (skipped): ${DEAD_UNIMPORTANT[*]}"

          done

          echo ""
          echo "Rotation complete."
